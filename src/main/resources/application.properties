# CONFIGURACIÓN DE BASE DE DATOS LOCAL (H2)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true

# CREDENCIALES DE AWS S3 
aws.s3.access-key=PONER_AQUI_TU_ACCESS_KEY
aws.s3.secret-key=PONER_AQUI_TU_SECRET_KEY
aws.s3.session-token=PONER_AQUI_TU_SESSION_TOKEN
aws.s3.region=us-east-1
aws.s3.bucket-name=duoc-inscripciones-bucket-cristian-olivares

server.port=8080