name: CI/CD Pipeline Desarrollo Cloud Native

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar codigo fuente
      uses: actions/checkout@v4

    - name: Configurar Java 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'

    - name: Compilar Proyecto con Maven
      run: chmod +x mvnw && ./mvnw clean package

    - name: Autenticar en Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Construir y Publicar Imagen en Docker Hub
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/inscripciones-backend:latest .
        docker push ${{ secrets.DOCKER_USERNAME }}/inscripciones-backend:latest

    - name: Desplegar en Instancia EC2 mediante SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # 1. Asegurar Docker y dependencias
          sudo apt-get update -y
          sudo apt-get install -y docker.io nfs-common lsof
          sudo systemctl start docker
          sudo systemctl enable docker

          # 2. Configuración de EFS (Volumen compartido)
          sudo mkdir -p /mnt/efs_guias
          sudo mkdir -p /home/ubuntu/efs_local_guias
          if ! mountpoint -q /mnt/efs_guias; then
            sudo mount -t nfs4 -o nfsvers=4.1,rsize=1048576,wsize=1048576,hard,timeo=600,retrans=2,noresvport fs-0b535e067b2778e63.efs.us-east-1.amazonaws.com:/ /mnt/efs_guias
          fi
          sudo mount --bind /mnt/efs_guias /home/ubuntu/efs_local_guias

          # 3. Despliegue del contenedor
          sudo docker stop inscripciones-backend || true
          sudo docker rm -f inscripciones-backend || true
          sudo lsof -t -i:8080 | xargs -r sudo kill -9 || true
          
          sudo docker pull ${{ secrets.DOCKER_USERNAME }}/inscripciones-backend:latest
          
          # 4. Ejecución usando puerto 8081 para evitar conflictos
          sudo docker run -d \
            --name inscripciones-backend \
            -p 8081:8080 \
            -e AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }} \
            -e AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }} \
            -e AWS_SESSION_TOKEN=${{ secrets.AWS_SESSION_TOKEN }} \
            -v /home/ubuntu/efs_local_guias:/root/efs_local_guias \
            ${{ secrets.DOCKER_USERNAME }}/inscripciones-backend:latest