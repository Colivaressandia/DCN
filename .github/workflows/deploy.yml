name: CI/CD Pipeline Desarrollo Cloud Native

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar codigo fuente
      uses: actions/checkout@v4

    - name: Configurar Java 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'

    - name: Autenticar en Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Construir y Publicar Imagen en Docker Hub
      run: |
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/inscripciones-backend:latest .
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/inscripciones-backend:latest

    - name: Desplegar en Instancia EC2 mediante SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.AWS_EC2_HOST }}
        username: ec2-user
        key: ${{ secrets.AWS_EC2_SSH_KEY }}
        script: |
          sudo docker stop inscripciones-backend || true
          sudo docker rm inscripciones-backend || true
          sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/inscripciones-backend:latest
          sudo docker run -d --name inscripciones-backend -p 8080:8080 ${{ secrets.DOCKERHUB_USERNAME }}/inscripciones-backend:latest