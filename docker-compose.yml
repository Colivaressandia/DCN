version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:4.0-management
    container_name: rabbitmq
    ports:
      - "5672:5672"   # Puerto para la comunicación entre App y Rabbit
      - "15672:15672" # Puerto para el panel de administración web
    networks:
      - cloud-network

  app:
    build: .
    container_name: inscripciones-app
    ports:
      - "8080:8080"
    environment:
      # Esta variable inyecta el host "rabbitmq" para que Spring use el contenedor
      - RABBITMQ_HOST=rabbitmq 
      - SPRING_RABBITMQ_PORT=5672
    depends_on:
      - rabbitmq
    networks:
      - cloud-network

networks:
  cloud-network:
    driver: bridge